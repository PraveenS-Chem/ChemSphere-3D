<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemSphere Pro Optimized</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.5.3/3Dmol-min.js"></script>

<style>

:root{
--bg:#04060f;
--surface:#080d1a;
--surface2:#0d1428;
--border:rgba(100,160,255,0.1);
--accent:#3b7fff;
--accent2:#00d4aa;
--text:#e8f0ff;
--text-muted:#6b80a8;
--mono:'Space Mono', monospace;
--sans:'Outfit', sans-serif;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:var(--bg);
color:var(--text);
font-family:var(--sans);
overflow:hidden;
}

header{
height:58px;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 24px;
border-bottom:1px solid var(--border);
background:#080d1a;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-mark{
width:38px;
height:38px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,var(--accent),var(--accent2));
font-weight:700;
font-size:12px;
}

.logo h1{
font-size:18px;
}

.app{
display:flex;
height:calc(100vh - 58px);
}

.sidebar{
width:330px;
background:#080d1a;
border-right:1px solid var(--border);
overflow-y:auto;
}

.block{
padding:18px;
border-bottom:1px solid var(--border);
}

.label{
font-size:10px;
font-family:var(--mono);
letter-spacing:2px;
margin-bottom:12px;
color:var(--text-muted);
text-transform:uppercase;
}

.search-row{
display:flex;
gap:8px;
}

.search{
flex:1;
padding:10px 14px;
border-radius:10px;
border:1px solid var(--border);
background:var(--surface2);
color:white;
outline:none;
}

.btn{
padding:10px 16px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
font-weight:600;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.card{
padding:12px;
border-radius:10px;
background:var(--surface2);
border:1px solid var(--border);
cursor:pointer;
transition:0.2s;
}

.card:hover{
border-color:var(--accent);
transform:translateY(-2px);
}

.formula{
font-family:var(--mono);
font-size:13px;
color:var(--accent2);
margin-bottom:4px;
}

.name{
font-size:11px;
color:var(--text-muted);
}

.viewer-wrap{
flex:1;
position:relative;
background:#04060f;
}

#viewer{
width:100%;
height:100%;
}

.loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.8);
z-index:10;
font-family:var(--mono);
font-size:12px;
}

.loader.hidden{
display:none;
}

.info{
position:absolute;
top:18px;
left:18px;
width:280px;
padding:16px;
border-radius:14px;
background:rgba(8,13,26,0.92);
border:1px solid var(--border);
backdrop-filter:blur(10px);
}

.info h2{
font-size:18px;
margin-bottom:4px;
}

.info-formula{
font-family:var(--mono);
color:var(--accent2);
margin-bottom:14px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:var(--surface2);
padding:10px;
border-radius:10px;
}

.stat-label{
font-size:8px;
font-family:var(--mono);
letter-spacing:1px;
color:var(--text-muted);
margin-bottom:4px;
}

.stat-value{
font-size:13px;
}

.err{
margin-top:10px;
padding:10px;
border-radius:10px;
background:rgba(255,0,0,0.1);
color:#ff8080;
font-size:12px;
display:none;
}

.ctrl{
position:absolute;
bottom:18px;
right:18px;
display:flex;
flex-direction:column;
gap:8px;
}

.ctrl button{
width:40px;
height:40px;
border:none;
border-radius:10px;
background:#0d1428;
border:1px solid var(--border);
color:white;
cursor:pointer;
font-size:16px;
}

@media(max-width:760px){

html,body{
overflow:auto;
}

.app{
flex-direction:column;
height:auto;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid var(--border);
}

.viewer-wrap{
height:72vh;
min-height:320px;
}

}

</style>
</head>

<body>

<header>
<div class="logo">
<div class="logo-mark">CS</div>
<div>
<h1>ChemSphere Pro</h1>
</div>
</div>
</header>

<div class="app">

<div class="sidebar">

<div class="block">

<div class="label">
Search Molecule
</div>

<div class="search-row">
<input id="searchInput" class="search" placeholder="Methane, Benzene...">
<button class="btn" onclick="searchMolecule()">View</button>
</div>

<div class="err" id="errorBox"></div>

</div>

<div class="block">

<div class="label">
Quick Load
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<div class="viewer-wrap">

<div class="loader hidden" id="loader">
Loading Molecule...
</div>

<div id="viewer"></div>

<div class="info">

<h2 id="molName">Methane</h2>

<div class="info-formula" id="molFormula">
CH₄
</div>

<div class="info-grid">

<div class="stat">
<div class="stat-label">Geometry</div>
<div class="stat-value" id="molGeo">Tetrahedral</div>
</div>

<div class="stat">
<div class="stat-label">Hybridization</div>
<div class="stat-value" id="molHybrid">sp³</div>
</div>

<div class="stat">
<div class="stat-label">Bond Angle</div>
<div class="stat-value" id="molAngle">109.5°</div>
</div>

<div class="stat">
<div class="stat-label">Dipole</div>
<div class="stat-value" id="molDipole">0 D</div>
</div>

</div>

</div>

<div class="ctrl">

<button onclick="resetView()">⌖</button>

<button onclick="zoomIn()">+</button>

<button onclick="zoomOut()">−</button>

</div>

</div>

</div>

<script>

const MOLECULES = [

{
key:"CH4",
formula:"CH₄",
name:"Methane",
geo:"Tetrahedral",
hybrid:"sp³",
angle:"109.5°",
dipole:"0 D"
},

{
key:"H2O",
formula:"H₂O",
name:"Water",
geo:"Bent",
hybrid:"sp³",
angle:"104.5°",
dipole:"1.85 D"
},

{
key:"NH3",
formula:"NH₃",
name:"Ammonia",
geo:"Trigonal Pyramidal",
hybrid:"sp³",
angle:"107°",
dipole:"1.47 D"
},

{
key:"CO2",
formula:"CO₂",
name:"Carbon Dioxide",
geo:"Linear",
hybrid:"sp",
angle:"180°",
dipole:"0 D"
},

{
key:"BF3",
formula:"BF₃",
name:"Boron Trifluoride",
geo:"Trigonal Planar",
hybrid:"sp²",
angle:"120°",
dipole:"0 D"
}

];

let viewer;
let currentModel;

/* MOBILE PERFORMANCE OPTIMIZATION */
let isRotating = window.innerWidth > 768;

window.onload = () => {

const el = document.getElementById("viewer");

/* GPU OPTIMIZATION */
viewer = $3Dmol.createViewer(el,{
backgroundColor:"#04060f",
antialias:false
});

renderGrid();

loadMolecule("CH4");

};

function renderGrid(){

document.getElementById("grid").innerHTML =
MOLECULES.map(m=>`

<div class="card" onclick="loadMolecule('${m.key}')">

<div class="formula">${m.formula}</div>

<div class="name">${m.name}</div>

</div>

`).join("");

}

function searchMolecule(){

const val =
document.getElementById("searchInput").value.trim();

if(!val) return;

loadMolecule(val);

}

async function loadMolecule(query){

showLoader(true);
showError(null);

try{

const cidRes = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(query)}/cids/JSON`
);

if(!cidRes.ok){
throw new Error("Molecule not found.");
}

const cidData = await cidRes.json();

const cid = cidData.IdentifierList.CIDs[0];

const sdfRes = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF?record_type=3d`
);

const sdf = await sdfRes.text();

viewer.clear();

currentModel = viewer.addModel(sdf,"sdf");

currentModel.setStyle({},{
stick:{
radius:0.16,
colorscheme:"Jmol"
}
});

viewer.zoomTo();

viewer.render();

/* LIGHTWEIGHT ROTATION */
if(isRotating){

viewer.spin("y",0.05);

}

const meta =
MOLECULES.find(m=>m.key===query);

if(meta){

fillInfo(meta);

}else{

document.getElementById("molName").textContent = query;

}

}catch(err){

showError(err.message);

}

showLoader(false);

}

function fillInfo(m){

document.getElementById("molName").textContent = m.name;

document.getElementById("molFormula").innerHTML = m.formula;

document.getElementById("molGeo").textContent = m.geo;

document.getElementById("molHybrid").textContent = m.hybrid;

document.getElementById("molAngle").textContent = m.angle;

document.getElementById("molDipole").textContent = m.dipole;

}

function resetView(){

viewer.zoomTo();
viewer.render();

}

function zoomIn(){

viewer.zoom(1.2,500);

}

function zoomOut(){

viewer.zoom(0.8,500);

}

function showLoader(show){

document.getElementById("loader")
.classList.toggle("hidden",!show);

}

function showError(msg){

const el = document.getElementById("errorBox");

if(msg){

el.style.display="block";

el.textContent=msg;

}else{

el.style.display="none";

}

}

</script>

</body>
</html>
