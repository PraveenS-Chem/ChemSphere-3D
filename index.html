<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemSphere 3D</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stable 3Dmol CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.5.3/3Dmol-min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100dvh;
            background: #020617;
        }

        body {
            font-family: sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="border-b border-slate-800 bg-slate-900 px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 rounded-xl w-12 h-12 flex items-center justify-center text-xl font-bold">
                3D
            </div>

            <div>
                <h1 class="text-2xl font-bold text-indigo-300">ChemSphere 3D</h1>
                <p class="text-sm text-slate-400">Class 11 & NEET Molecular Geometry</p>
            </div>
        </div>

        <div class="hidden md:block text-sm text-slate-400">
            Drag to rotate • Pinch to zoom
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col lg:flex-row relative min-h-[100dvh] overflow-x-hidden">

        <!-- SIDEBAR -->
        <div class="w-full lg:w-96 bg-slate-900/60 p-5 border-r border-slate-800 flex flex-col gap-5">

            <!-- SEARCH -->
            <div>
                <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">
                    Search Molecule
                </label>

                <div class="flex gap-2">
                    <input
                        type="text"
                        id="mol-input"
                        placeholder="Methane, Benzene, Aspirin..."
                        class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-500"
                    >

                    <button
                        onclick="loadMoleculeByName()"
                        class="bg-indigo-600 hover:bg-indigo-500 transition px-5 py-3 rounded-xl font-semibold"
                    >
                        View
                    </button>
                </div>
            </div>

            <!-- QUICK SELECT -->
            <div>
                <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">
                    NEET / Class 11 Essentials
                </label>

                <select
                    id="vsepr-select"
                    onchange="loadQuickSelect()"
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm"
                >
                    <option value="CH4">Methane (CH4)</option>
                    <option value="H2O">Water (H2O)</option>
                    <option value="NH3">Ammonia (NH3)</option>
                    <option value="CO2">Carbon Dioxide (CO2)</option>
                    <option value="BF3">Boron Trifluoride (BF3)</option>
                    <option value="PCl5">PCl5</option>
                    <option value="SF6">SF6</option>
                    <option value="XeF4">XeF4</option>
                    <option value="C6H6">Benzene</option>
                </select>
            </div>

            <!-- SETTINGS -->
            <div class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 flex flex-col gap-4">

                <div class="flex justify-between items-center">
                    <span class="text-sm text-slate-300">Model Style</span>

                    <select
                        id="style-select"
                        onchange="updateStyle()"
                        class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-sm"
                    >
                        <option value="stick">Ball & Stick</option>
                        <option value="sphere">Sphere</option>
                        <option value="line">Wireframe</option>
                    </select>
                </div>

                <div class="flex justify-between items-center">
                    <span class="text-sm text-slate-300">Auto Rotate</span>

                    <input
                        type="checkbox"
                        id="rotate-toggle"
                        onchange="toggleRotation()"
                        class="w-5 h-5"
                    >
                </div>
            </div>

            <!-- INFO -->
            <div id="info-card" class="bg-slate-950 border border-slate-800 rounded-2xl p-5 flex flex-col gap-3">

                <div>
                    <h2 id="mol-name" class="text-2xl font-bold">Methane</h2>
                    <p id="mol-formula" class="text-indigo-400">CH₄</p>
                </div>

                <div>
                    <span class="text-xs text-slate-500 uppercase">Molecular Weight</span>
                    <p id="mol-weight" class="text-lg text-slate-200">16.04 g/mol</p>
                </div>

                <div>
                    <span class="text-xs text-slate-500 uppercase">Geometry / VSEPR</span>
                    <p id="mol-geometry" class="text-lg text-emerald-400 font-semibold">
                        Tetrahedral (109.5°)
                    </p>
                </div>
            </div>

            <!-- ERROR -->
            <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/20 text-red-300 p-3 rounded-xl text-sm"></div>

        </div>

        <!-- 3D VIEW -->
        <div class="flex-1 relative bg-slate-950 min-h-[75vh] lg:min-h-0">

            <!-- LOADER -->
            <div
                id="loader"
                class="absolute inset-0 bg-slate-950/80 flex flex-col items-center justify-center z-20 gap-3"
            >
                <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-slate-400 text-sm">Loading molecule...</p>
            </div>

            <!-- VIEWER -->
            <div id="container-3d" class="w-full h-[75vh] lg:h-full"></div>
        </div>
    </main>

<script>

let viewer = null;
let currentModel = null;
let isRotating = window.innerWidth > 768;

const geometryMap = {
    "H2O": {
        name: "Water",
        formula: "H₂O",
        weight: "18.015 g/mol",
        geometry: "Bent / V Shape"
    },

    "CO2": {
        name: "Carbon Dioxide",
        formula: "CO₂",
        weight: "44.01 g/mol",
        geometry: "Linear"
    },

    "BF3": {
        name: "Boron Trifluoride",
        formula: "BF₃",
        weight: "67.81 g/mol",
        geometry: "Trigonal Planar"
    },

    "CH4": {
        name: "Methane",
        formula: "CH₄",
        weight: "16.04 g/mol",
        geometry: "Tetrahedral (109.5°)"
    },

    "NH3": {
        name: "Ammonia",
        formula: "NH₃",
        weight: "17.031 g/mol",
        geometry: "Trigonal Pyramidal"
    },

    "PCl5": {
        name: "Phosphorus Pentachloride",
        formula: "PCl₅",
        weight: "208.2 g/mol",
        geometry: "Trigonal Bipyramidal"
    },

    "SF6": {
        name: "Sulfur Hexafluoride",
        formula: "SF₆",
        weight: "146.06 g/mol",
        geometry: "Octahedral"
    },

    "XeF4": {
        name: "Xenon Tetrafluoride",
        formula: "XeF₄",
        weight: "207.3 g/mol",
        geometry: "Square Planar"
    },

    "C6H6": {
        name: "Benzene",
        formula: "C₆H₆",
        weight: "78.11 g/mol",
        geometry: "Planar Hexagonal Ring"
    }
};

window.onload = function() {

    if (typeof $3Dmol === 'undefined') {
        alert('3Dmol library failed to load. Please refresh.');
        return;
    }

    const element = document.getElementById('container-3d');

    const config = {
        backgroundColor: '#020617',
        antialias: false
    };

    viewer = $3Dmol.createViewer(element, config);

    document.getElementById('rotate-toggle').checked = isRotating;

    document.getElementById('vsepr-select').value = 'CH4';

    loadQuickSelect();
};

function loadQuickSelect() {
    const value = document.getElementById('vsepr-select').value;

    if (!value) return;

    fetchAndRenderMolecule(value, geometryMap[value]);
}

function loadMoleculeByName() {
    const inputVal = document.getElementById('mol-input').value.trim();

    if (!inputVal) return;

    fetchAndRenderMolecule(inputVal, null);
}

async function fetchAndRenderMolecule(query, metadataFallback) {

    showLoader(true);
    showError(null);

    try {

        const response = await fetch(
            `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(query)}/SDF?record_type=3d`
        );

        if (!response.ok) {
            throw new Error('Could not load molecule data. Try another name.');
        }

        const sdfData = await response.text();

        viewer.clear();

        currentModel = viewer.addModel(sdfData, 'sdf');

        updateStyle();

        viewer.zoomTo();
        viewer.render();

        if (metadataFallback) {
            updateInfoCard(
                metadataFallback.name,
                metadataFallback.formula,
                metadataFallback.weight,
                metadataFallback.geometry
            );
        } else {
            await fetchLiveMetadata(query);
        }

        if (isRotating) {
            viewer.spin('y', 0.05);
        }

    } catch (err) {
        showError(err.message);
    }

    showLoader(false);
}

async function fetchLiveMetadata(name) {

    try {

        const infoRes = await fetch(
            `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/property/MolecularFormula,MolecularWeight,IUPACName/JSON`
        );

        if (!infoRes.ok) {
            throw new Error();
        }

        const data = await infoRes.json();

        const props = data.PropertyTable.Properties[0];

        updateInfoCard(
            props.IUPACName || name,
            props.MolecularFormula,
            props.MolecularWeight + ' g/mol',
            'Custom Molecule'
        );

    } catch {

        updateInfoCard(
            name,
            'N/A',
            'N/A',
            'Custom Molecule'
        );
    }
}

function updateStyle() {

    if (!viewer || !currentModel) return;

    const styleType = document.getElementById('style-select').value;

    let styleConfig = {};

    switch(styleType) {

        case 'sphere':
            styleConfig = {
                sphere: { scale: 0.22 }
            };
            break;

        case 'line':
            styleConfig = {
                line: {}
            };
            break;

        case 'stick':
        default:
            styleConfig = {
                stick: {
                    radius: 0.14,
                    colorscheme: 'Jmol'
                }
            };
            break;
    }

    currentModel.setStyle({}, styleConfig);

    viewer.render();
}

function toggleRotation() {

    isRotating = document.getElementById('rotate-toggle').checked;

    if (!viewer) return;

    if (isRotating) {
        viewer.spin('y', 0.05);
    } else {
        viewer.spin(false);
    }
}

function updateInfoCard(name, formula, weight, geometry) {

    document.getElementById('mol-name').innerHTML = name;
    document.getElementById('mol-formula').innerHTML = formula;
    document.getElementById('mol-weight').innerHTML = weight;
    document.getElementById('mol-geometry').innerHTML = geometry;
}

function showLoader(show) {

    const loader = document.getElementById('loader');

    if (show) {
        loader.style.display = 'flex';
    } else {
        loader.style.display = 'none';
    }
}

function showError(msg) {

    const errBox = document.getElementById('error-msg');

    if (msg) {
        errBox.innerText = msg;
        errBox.classList.remove('hidden');
    } else {
        errBox.classList.add('hidden');
    }
}

document.getElementById('mol-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        loadMoleculeByName();
    }
});

</script>

</body>
</html>
