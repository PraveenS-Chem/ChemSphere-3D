<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemSphere Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>

:root{
--bg:#04060f;
--surface:#0b1220;
--surface2:#111827;
--accent:#3b82f6;
--accent2:#14b8a6;
--text:#e5e7eb;
--muted:#94a3b8;
--border:rgba(255,255,255,0.06);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
background:var(--bg);
font-family:'Outfit',sans-serif;
color:var(--text);
}

body{
display:flex;
flex-direction:column;
}

header{
height:70px;
display:flex;
align-items:center;
padding:0 18px;
border-bottom:1px solid var(--border);
background:#08101d;
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo-box{
width:48px;
height:48px;
border-radius:14px;
background:linear-gradient(135deg,#3b82f6,#14b8a6);
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
font-size:18px;
}

.logo h1{
font-size:28px;
font-weight:700;
}

.logo p{
font-size:13px;
color:var(--muted);
}

.app{
flex:1;
display:flex;
flex-direction:column;
}

.sidebar{
width:100%;
background:#08101d;
border-bottom:1px solid var(--border);
padding:20px;
}

.section-title{
font-size:11px;
letter-spacing:4px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:14px;
}

.search-row{
display:flex;
gap:12px;
margin-bottom:18px;
}

.search{
flex:1;
padding:16px;
border-radius:16px;
border:1px solid var(--border);
background:var(--surface2);
color:white;
font-size:18px;
outline:none;
}

.search:focus{
border-color:var(--accent);
}

.btn{
padding:16px 24px;
border:none;
border-radius:16px;
background:var(--accent);
color:white;
font-weight:700;
font-size:18px;
cursor:pointer;
}

.error{
display:none;
padding:16px;
border-radius:16px;
background:rgba(255,0,0,0.15);
color:#ff9a9a;
margin-bottom:18px;
font-size:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-2px);
border-color:var(--accent);
}

.formula{
font-size:34px;
font-weight:700;
color:var(--accent2);
margin-bottom:8px;
}

.name{
font-size:18px;
color:var(--muted);
}

.viewer-wrap{
position:relative;
flex:1;
background:#020617;
min-height:75vh;
height:75vh;
overflow:hidden;
}

#viewer{
width:100%;
height:100%;
min-height:75vh;
}

.loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.75);
z-index:10;
font-size:18px;
}

.loader.hidden{
display:none;
}

.info{
position:absolute;
left:16px;
bottom:16px;
right:16px;
background:rgba(11,18,32,0.92);
backdrop-filter:blur(14px);
border:1px solid var(--border);
border-radius:24px;
padding:22px;
z-index:5;
}

.info h2{
font-size:42px;
margin-bottom:10px;
}

.info-formula{
font-size:30px;
font-weight:700;
color:var(--accent2);
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.stat{
background:rgba(255,255,255,0.03);
padding:18px;
border-radius:18px;
}

.stat-label{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:10px;
}

.stat-value{
font-size:28px;
font-weight:700;
}

.ctrl{
position:absolute;
right:16px;
bottom:260px;
display:flex;
flex-direction:column;
gap:14px;
z-index:5;
}

.ctrl button{
width:64px;
height:64px;
border-radius:20px;
border:none;
background:#0f172a;
color:white;
font-size:28px;
cursor:pointer;
border:1px solid var(--border);
}

@media(min-width:900px){

.app{
flex-direction:row;
}

.sidebar{
width:360px;
height:100%;
overflow-y:auto;
border-right:1px solid var(--border);
border-bottom:none;
}

.viewer-wrap{
height:100%;
min-height:100%;
}

.info{
width:340px;
right:auto;
bottom:18px;
}

.ctrl{
bottom:18px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">

<div class="logo-box">
CS
</div>

<div>
<h1>ChemSphere Pro</h1>
<p>Class 11 & NEET Molecular Viewer</p>
</div>

</div>

</header>

<div class="app">

<div class="sidebar">

<div class="section-title">
Search Molecule
</div>

<div class="search-row">

<input
id="searchInput"
class="search"
placeholder="Paracetamol, Benzene..."
>

<button class="btn" onclick="searchMolecule()">
View
</button>

</div>

<div class="error" id="errorBox"></div>

<div class="section-title">
Quick Load
</div>

<div class="grid" id="grid"></div>

</div>

<div class="viewer-wrap">

<div id="viewer"></div>

<div class="loader hidden" id="loader">
Loading molecule...
</div>

<div class="info">

<h2 id="molName">
Methane
</h2>

<div class="info-formula" id="molFormula">
CH₄
</div>

<div class="stats">

<div class="stat">
<div class="stat-label">Geometry</div>
<div class="stat-value" id="molGeo">Tetrahedral</div>
</div>

<div class="stat">
<div class="stat-label">Hybridization</div>
<div class="stat-value" id="molHybrid">sp³</div>
</div>

<div class="stat">
<div class="stat-label">Bond Angle</div>
<div class="stat-value" id="molAngle">109.5°</div>
</div>

<div class="stat">
<div class="stat-label">Dipole</div>
<div class="stat-value" id="molDipole">0 D</div>
</div>

</div>

</div>

<div class="ctrl">

<button onclick="resetView()">⌖</button>

<button onclick="zoomIn()">+</button>

<button onclick="zoomOut()">−</button>

</div>

</div>

</div>

<script>

const MOLECULES = [

{
key:"CH4",
formula:"CH₄",
name:"Methane",
geo:"Tetrahedral",
hybrid:"sp³",
angle:"109.5°",
dipole:"0 D"
},

{
key:"H2O",
formula:"H₂O",
name:"Water",
geo:"Bent",
hybrid:"sp³",
angle:"104.5°",
dipole:"1.85 D"
},

{
key:"NH3",
formula:"NH₃",
name:"Ammonia",
geo:"Trigonal Pyramidal",
hybrid:"sp³",
angle:"107°",
dipole:"1.47 D"
},

{
key:"CO2",
formula:"CO₂",
name:"Carbon Dioxide",
geo:"Linear",
hybrid:"sp",
angle:"180°",
dipole:"0 D"
},

{
key:"BF3",
formula:"BF₃",
name:"Boron Trifluoride",
geo:"Trigonal Planar",
hybrid:"sp²",
angle:"120°",
dipole:"0 D"
}

];

let viewer;
let currentModel;
let isRotating = window.innerWidth > 768;

window.onload = () => {

if(typeof $3Dmol === "undefined"){

showError("3Dmol failed to load. Refresh page.");

return;

}

viewer = $3Dmol.createViewer("viewer",{
backgroundColor:"#020617",
antialias:false
});

renderGrid();

setTimeout(()=>{
loadMolecule("CH4");
},500);

};

function renderGrid(){

document.getElementById("grid").innerHTML =
MOLECULES.map(m=>`

<div class="card" onclick="loadMolecule('${m.key}')">

<div class="formula">${m.formula}</div>

<div class="name">${m.name}</div>

</div>

`).join("");

}

function searchMolecule(){

const val =
document.getElementById("searchInput").value.trim();

if(!val) return;

loadMolecule(val);

}

async function loadMolecule(query){

showLoader(true);

showError(null);

try{

const cidRes = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(query)}/cids/JSON`
);

if(!cidRes.ok){

throw new Error(
"Could not fetch molecule data."
);

}

const cidData = await cidRes.json();

if(
!cidData.IdentifierList ||
!cidData.IdentifierList.CIDs ||
cidData.IdentifierList.CIDs.length === 0
){

throw new Error(
"No molecule found. Try another name."
);

}

const cid =
cidData.IdentifierList.CIDs[0];

const sdfRes = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF?record_type=3d`
);

if(!sdfRes.ok){

throw new Error(
"3D structure unavailable."
);

}

const sdf = await sdfRes.text();

if(!sdf || sdf.length < 10){

throw new Error(
"Invalid molecule structure."
);

}

viewer.clear();

currentModel =
viewer.addModel(sdf,"sdf");

currentModel.setStyle({},{
stick:{
radius:0.16,
colorscheme:"Jmol"
}
});

viewer.zoomTo();

viewer.render();

if(isRotating){

viewer.spin("y",0.05);

}

const meta =
MOLECULES.find(m=>m.key===query);

if(meta){

fillInfo(meta);

}else{

document.getElementById("molName").textContent =
query;

document.getElementById("molFormula").textContent =
"Custom Molecule";

}

}catch(err){

showError(err.message);

}

showLoader(false);

}

function fillInfo(m){

document.getElementById("molName").textContent =
m.name;

document.getElementById("molFormula").innerHTML =
m.formula;

document.getElementById("molGeo").textContent =
m.geo;

document.getElementById("molHybrid").textContent =
m.hybrid;

document.getElementById("molAngle").textContent =
m.angle;

document.getElementById("molDipole").textContent =
m.dipole;

}

function resetView(){

viewer.zoomTo();

viewer.render();

}

function zoomIn(){

viewer.zoom(1.2,500);

}

function zoomOut(){

viewer.zoom(0.8,500);

}

function showLoader(show){

document.getElementById("loader")
.classList.toggle("hidden",!show);

}

function showError(msg){

const el =
document.getElementById("errorBox");

if(msg){

el.style.display="block";

el.textContent=msg;

}else{

el.style.display="none";

}

}

</script>

</body>
</html>
